services:
  # Backend Service
  - type: web
    name: questgen-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: OPENROUTER_API_KEY
        sync: false
    autoDeploy: true
    
  # Frontend Service (if you have a React/Vue frontend)
  - type: web
    name: questgen-frontend
    env: static
    plan: free
    buildCommand: "npm run build"
    staticPublishPath: ./dist
    autoDeploy: true
